name: Deploy Frontend

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  OWNER_LC: zeker2908
  API_URL: https://api.haslgraim.ru
  OAUTH_BASE_URL: https://haslgraim.ru

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          VITE_API_BASE_URL=${{ env.API_URL }}/api/v1 VITE_OAUTH_BASE_URL=${{ env.OAUTH_BASE_URL }} npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.API_URL }}/api/v1
            VITE_OAUTH_BASE_URL=${{ env.API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo ${{ secrets.CR_PAT }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            cd /opt/adaptive-learning-platform

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps frontend
            docker image prune -f
